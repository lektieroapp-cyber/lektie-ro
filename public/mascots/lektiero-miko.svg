<svg viewBox="-12 -12 128 128" xmlns="http://www.w3.org/2000/svg">
    <!-- Ears -->
    <circle cx="24" cy="26" r="12" fill="#2C2138"/>
    <circle cx="80" cy="26" r="12" fill="#2C2138"/>
