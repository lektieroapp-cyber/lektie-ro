    <circle cx="26" cy="62" r="6" fill="#A8C5DC" opacity="0.45"/>
    <circle cx="78" cy="62" r="6" fill="#A8C5DC" opacity="0.45"/>
    <!-- Eyes (small, calm) -->
    <circle cx="40" cy="52" r="3.5" fill="#2C2138"/>
    <circle cx="64" cy="52" r="3.5" fill="#2C2138"/>
