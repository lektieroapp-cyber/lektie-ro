    <circle cx="78" cy="30" r="10" fill="#F8F4EC"/>
    <circle cx="78" cy="30" r="5" fill="#F4A7A3" opacity="0.5"/>
    <!-- Head (big round) -->
    <circle cx="52" cy="56" r="34" fill="#F8F4EC"/>
    <!-- Subtle shadow for volume -->
    <ellipse cx="52" cy="76" rx="30" ry="8" fill="#D9D5C7" opacity="0.35"/>
