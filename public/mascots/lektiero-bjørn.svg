    <!-- Mouth -->
    <path d="M52 66 L52 70" stroke="#2C2138" stroke-width="2" stroke-linecap="round"/>
    <path d="M52 70 Q48 74 45 72" stroke="#2C2138" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M52 70 Q56 74 59 72" stroke="#2C2138" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Snow fleck on ear -->
