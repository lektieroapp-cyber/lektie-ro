<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" width="640" height="240">
  <!-- Cream background (remove this rect for transparent variant) -->
  <rect width="640" height="240" fill="#FBF5EE"/>

  <!-- Heart mark in soft coral bubble -->
  <g transform="translate(60, 70)">
    <circle cx="50" cy="50" r="50" fill="#D85C48" fill-opacity="0.12"/>
    <path d="M50 82s-22-13-22-31a11 11 0 0 1 22-6 11 11 0 0 1 22 6c0 18-22 31-22 31z"
          fill="#D85C48"/>
  </g>

  <!-- Wordmark: "Lektie" in ink + "Ro" in coral -->
  <g transform="translate(190, 155)" font-family="'Fraunces', 'Times New Roman', Georgia, serif" font-weight="700" font-size="84" letter-spacing="-1">
    <text fill="#1E2A3A">Lektie<tspan fill="#D85C48">Ro</tspan></text>
  </g>
</svg>
